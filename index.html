<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⭐ Star Clicker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#07071a;--bg2:#0d0d26;--bg3:#13132e;--bg4:#1a1a3a;
  --border:#2a2a5a;--border2:#3a3a6a;
  --text:#e8e0ff;--text2:#AFA9EC;--text3:#7a6fa8;--text4:#4a4470;
  --accent:#7F77DD;--accent2:#534AB7;--gold:#ffd700;
}
body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:16px;}
#app{width:100%;max-width:700px;}
.screen{display:none;}
.screen.active{display:block;}
</style>
</head>
<body>
<div id="app">
  <div id="auth-screen" class="screen active">
    <div style="font-size:36px;margin-bottom:8px;">⭐</div>
    <div style="font-size:24px;font-weight:500;margin-bottom:4px;color:var(--text)">star clicker</div>
    <div style="font-size:12px;color:var(--text4);margin-bottom:1.5rem;">the universe awaits</div>
    <div style="background:var(--bg2);border:0.5px solid var(--border);border-radius:16px;padding:2rem;width:100%;max-width:360px;margin:0 auto;">
      <div style="display:flex;gap:8px;margin-bottom:1.2rem;">
        <button onclick="alert('Login feature demo')" style="flex:1;padding:8px;font-size:13px;border-radius:8px;border:0.5px solid var(--border);background:var(--accent2);color:var(--text);cursor:pointer;">log in</button>
        <button onclick="alert('Register feature demo')" style="flex:1;padding:8px;font-size:13px;border-radius:8px;border:0.5px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;">register</button>
      </div>
      <div style="font-size:12px;color:var(--text3);text-align:center;padding:2rem 1rem;background:var(--bg3);border-radius:8px;">
        Welcome to Star Clicker! This is a game to cure boredom. Click the star to earn stars, upgrade your abilities, and collect rare titles.
      </div>
    </div>
  </div>
</div>

<script>
console.log('Star Clicker loaded successfully');
</script>
</body>
</html>
